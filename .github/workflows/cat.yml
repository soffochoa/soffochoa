name: cat contribution

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: generate snake
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: soffochoa
          outputs: |-
            dist/github-contribution-grid-snake.svg?color_snake=%231c3469&color_dots=%23eaf3fb,%23cfe5f7,%23a9d2f0,%237bb8e8,%231c3469&color_background=%23ffffff
            dist/github-contribution-grid-snake-dark.svg?color_snake=%2387CEEB&color_dots=%230d1117,%230a2540,%23123a63,%231c5c91,%2387CEEB&color_background=%230d1117

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}